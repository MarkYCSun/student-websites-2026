<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Tetris Arena</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-bg-scene" aria-hidden="true">
    <div class="bg-carrier bg-dino bg-dino-1">
      <div class="bg-block-stack">
        <span class="bg-block"></span>
        <span class="bg-block"></span>
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🦖</span>
    </div>
    <div class="bg-carrier bg-dino bg-dino-2">
      <div class="bg-block-stack bg-stack-wide">
        <span class="bg-block"></span>
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🦖</span>
    </div>
    <div class="bg-carrier bg-donkey bg-donkey-1">
      <div class="bg-block-stack">
        <span class="bg-block"></span>
        <span class="bg-block"></span>
        <span class="bg-block"></span>
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🫏</span>
    </div>
    <div class="bg-carrier bg-donkey bg-donkey-2">
      <div class="bg-block-stack bg-stack-wide">
        <span class="bg-block"></span>
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🫏</span>
    </div>
    <div class="bg-carrier bg-dino bg-dino-3">
      <div class="bg-block-stack">
        <span class="bg-block"></span>
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🦖</span>
    </div>
    <div class="bg-carrier bg-dino bg-dino-4">
      <div class="bg-block-stack bg-stack-wide">
        <span class="bg-block"></span>
        <span class="bg-block"></span>
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🦖</span>
    </div>
    <div class="bg-carrier bg-dino bg-dino-5">
      <div class="bg-block-stack">
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🦖</span>
    </div>
    <div class="bg-carrier bg-dino bg-dino-6">
      <div class="bg-block-stack">
        <span class="bg-block"></span>
        <span class="bg-block"></span>
        <span class="bg-block"></span>
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🦖</span>
    </div>
    <div class="bg-carrier bg-dino bg-dino-7">
      <div class="bg-block-stack bg-stack-wide">
        <span class="bg-block"></span>
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🦖</span>
    </div>
    <div class="bg-carrier bg-dino bg-dino-8">
      <div class="bg-block-stack">
        <span class="bg-block"></span>
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🦖</span>
    </div>
    <div class="bg-carrier bg-dino bg-dino-9">
      <div class="bg-block-stack bg-stack-wide">
        <span class="bg-block"></span>
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🦖</span>
    </div>
    <div class="bg-carrier bg-dino bg-dino-10">
      <div class="bg-block-stack">
        <span class="bg-block"></span>
        <span class="bg-block"></span>
        <span class="bg-block"></span>
      </div>
      <span class="bg-emoji">🦖</span>
    </div>
  </div>
  <div class="app">
    <header class="topbar">
      <h1>Dino Tetris Arena</h1>
      <div class="topbar-actions">
        <button id="startBtn">Start Game</button>
        <button id="pauseBtn">Pause</button>
        <button id="musicBtn">Music: On</button>
        <button type="button" id="inviteBtn" class="btn-invite">Invite</button>
      </div>
    </header>

    <section id="networkPanel" class="network-panel hidden" aria-label="Multiplayer connection">
      <div class="network-card">
        <h2>Multiplayer (IP via WebSocket)</h2>
        <div class="network-grid">
          <label>
            Server URL
            <input id="serverUrl" type="text" value="ws://localhost:8080" />
          </label>
          <label>
            Room Code
            <input id="roomCode" type="text" value="ROOM-1" />
          </label>
          <label>
            Nickname
            <input id="nickname" type="text" value="Player" />
          </label>
        </div>
        <div class="network-buttons">
          <button id="hostBtn">Host Room</button>
          <button id="joinBtn">Join Room</button>
          <span id="netStatus">Offline</span>
        </div>
      </div>
    </section>

    <main class="game-layout" id="gameLayout">
      <section class="board-wrap">
        <h3>You</h3>
        <div class="dino-table">
          <div class="dino-table-head" aria-hidden="true">
            <div class="dino-head-ridge"></div>
            <div class="dino-head-face">
              <span class="dino-eye dino-eye-l"></span>
              <span class="dino-eye dino-eye-r"></span>
              <span class="dino-snout"></span>
            </div>
          </div>
          <div class="dino-table-core">
            <div class="board-row">
              <canvas id="boardLocal" width="300" height="600"></canvas>
              <aside class="next-panel" aria-label="Next piece">
                <h4>Next</h4>
                <canvas id="nextLocal" width="120" height="120"></canvas>
              </aside>
            </div>
          </div>
          <div class="dino-table-tail" aria-hidden="true">
            <div class="dino-tail-fin"></div>
          </div>
        </div>
        <div class="stats" id="statsLocal"></div>
      </section>
      <section id="remotePlayArea" class="board-wrap board-wrap-remote hidden" aria-hidden="true">
        <h3>Invited Player</h3>
        <div class="dino-table dino-table--rival">
          <div class="dino-table-head" aria-hidden="true">
            <div class="dino-head-ridge"></div>
            <div class="dino-head-face">
              <span class="dino-eye dino-eye-l"></span>
              <span class="dino-eye dino-eye-r"></span>
              <span class="dino-snout"></span>
            </div>
          </div>
          <div class="dino-table-core">
            <div class="board-row">
              <canvas id="boardRemote" width="300" height="600"></canvas>
              <aside class="next-panel" aria-label="Opponent next piece">
                <h4>Next</h4>
                <canvas id="nextRemote" width="120" height="120"></canvas>
              </aside>
            </div>
          </div>
          <div class="dino-table-tail" aria-hidden="true">
            <div class="dino-tail-fin"></div>
          </div>
        </div>
        <div class="stats" id="statsRemote"></div>
      </section>
    </main>

    <section class="leaderboard-section">
      <h2>Leaderboard</h2>
      <ol id="leaderboard"></ol>
    </section>
  </div>

  <div id="nameModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <h2>Game Over</h2>
      <p>Save your score to the leaderboard.</p>
      <label>
        Name
        <input id="scoreNameInput" type="text" maxlength="20" placeholder="Your name" />
      </label>
      <div class="modal-actions">
        <button id="saveScoreBtn">Save Score</button>
        <button id="closeModalBtn">Skip</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
