<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient-bg" aria-hidden="true">
    <div class="ambient-blob ambient-blob--1"></div>
    <div class="ambient-blob ambient-blob--2"></div>
    <div class="ambient-blob ambient-blob--3"></div>
    <span class="ambient-sparkle ambient-sparkle--1">✦</span>
    <span class="ambient-sparkle ambient-sparkle--2">✧</span>
    <span class="ambient-sparkle ambient-sparkle--3">·</span>
    <span class="ambient-sparkle ambient-sparkle--4">✦</span>
    <span class="ambient-sparkle ambient-sparkle--5">✧</span>
    <span class="ambient-sparkle ambient-sparkle--6">✦</span>
    <span class="ambient-sparkle ambient-sparkle--7">·</span>
    <span class="ambient-sparkle ambient-sparkle--8">✦</span>
    <span class="ambient-sparkle ambient-sparkle--9">✧</span>
    <span class="ambient-sparkle ambient-sparkle--10">✦</span>
  </div>
  <div class="decor-layer" aria-hidden="true">
    <span class="floaty deco-heart">❤</span>
    <span class="floaty deco-flower">✿</span>
    <span class="floaty deco-sparkle">✦</span>
    <span class="floaty deco-bow">🎀</span>
    <span class="floaty deco-heart heart-right">❤</span>
    <span class="floaty deco-cat">=^.^=</span>
  </div>
  <main class="game-shell">
    <section class="panel">
      <div class="title-row">
        <h1 class="title-heading">Pastel Tetris</h1>
        <span class="title-deco title-deco--bear" aria-hidden="true">
          <svg class="title-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" focusable="false">
            <circle cx="14" cy="15" r="7" fill="#fbbf24" stroke="#d97706" stroke-opacity="0.45" stroke-width="1" />
            <circle cx="34" cy="15" r="7" fill="#fbbf24" stroke="#d97706" stroke-opacity="0.45" stroke-width="1" />
            <ellipse
              cx="24"
              cy="30"
              rx="19"
              ry="17"
              fill="#f9a8d4"
              stroke="#db2777"
              stroke-opacity="0.28"
              stroke-width="1.2"
            />
            <ellipse cx="24" cy="28" rx="14" ry="12" fill="#fff5f9" />
            <circle cx="17" cy="27" r="3" fill="#7c3aed" />
            <circle cx="31" cy="27" r="3" fill="#7c3aed" />
            <ellipse cx="24" cy="33" rx="5" ry="3" fill="#ec4899" opacity="0.55" />
            <ellipse cx="24" cy="35" rx="3.5" ry="2" fill="#f472b6" />
          </svg>
        </span>
        <span class="title-deco title-deco--fairy" aria-hidden="true">
          <svg class="title-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" focusable="false">
            <ellipse cx="11" cy="26" rx="9" ry="13" fill="#a78bfa" stroke="#6d28d9" stroke-opacity="0.35" stroke-width="1" />
            <ellipse cx="37" cy="26" rx="9" ry="13" fill="#8b5cf6" stroke="#6d28d9" stroke-opacity="0.35" stroke-width="1" />
            <path
              d="M24 10 L31 42 H17 Z"
              fill="#f472b6"
              stroke="#db2777"
              stroke-opacity="0.3"
              stroke-width="1"
            />
            <circle cx="24" cy="14" r="8" fill="#fdf2f8" stroke="#f472b6" stroke-opacity="0.5" stroke-width="1" />
            <ellipse cx="24" cy="16" rx="2" ry="1.5" fill="#ec4899" opacity="0.55" />
            <path
              d="M40 6 L41 9 L44 9 L41.5 11 L42.5 14 L40 12 L37.5 14 L38.5 11 L36 9 L39 9 Z"
              fill="#facc15"
              stroke="#ca8a04"
              stroke-opacity="0.45"
              stroke-width="0.8"
            />
            <line x1="36" y1="12" x2="40" y2="8" stroke="#c026d3" stroke-width="1.4" stroke-linecap="round" />
          </svg>
        </span>
      </div>

      <div class="scoreboard">
        <div class="score-item">
          <p class="stat-label">Score</p>
          <p id="score" class="stat-value">0</p>
        </div>
        <div class="score-item">
          <p class="stat-label">Lines</p>
          <p id="lines" class="stat-value">0</p>
        </div>
        <div class="score-item" id="levelCard">
          <p class="stat-label">Level</p>
          <p id="level" class="stat-value">1</p>
        </div>
      </div>

      <div class="next-piece-panel">
        <p class="stat-label">Next Piece</p>
        <canvas id="nextCanvas" width="120" height="120" aria-label="Next tetris piece"></canvas>
      </div>

      <p class="controls">
        <strong>Controls</strong><br>
        Arrow keys: Move / Drop<br>
        Space: Rotate
      </p>
      <p id="status" class="status-text" aria-live="polite"></p>
      <div class="panel-actions">
        <button id="restartBtn" class="restart-btn" type="button">Restart</button>
        <button
          id="musicToggle"
          class="music-toggle"
          type="button"
          aria-pressed="true"
          aria-label="Turn background music off"
        >
          Music: On
        </button>
      </div>
    </section>
    <section class="board-wrap">
      <div class="board-stack">
        <canvas id="gameCanvas" width="300" height="600" aria-label="Tetris board"></canvas>
        <div id="levelUpBurst" class="fx-level-up" hidden aria-hidden="true"></div>
      </div>
    </section>

    <div
      id="gameOverOverlay"
      class="game-over-overlay"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="gameOverTitle"
    >
      <div class="game-over-celebration" aria-hidden="true">
        <span class="goc-piece"></span>
        <span class="goc-piece"></span>
        <span class="goc-piece"></span>
        <span class="goc-piece"></span>
        <span class="goc-piece"></span>
        <span class="goc-piece"></span>
        <span class="goc-piece"></span>
        <span class="goc-piece"></span>
        <span class="goc-piece"></span>
        <span class="goc-piece"></span>
        <span class="goc-piece"></span>
        <span class="goc-piece"></span>
        <span class="goc-twinkle">✦</span>
        <span class="goc-twinkle">✧</span>
        <span class="goc-twinkle">★</span>
        <span class="goc-twinkle">·</span>
        <span class="goc-twinkle">✦</span>
        <span class="goc-twinkle">✧</span>
      </div>
      <div class="game-over-card">
        <div class="game-over-decor" aria-hidden="true">
          <span class="go-spark go-spark--tl">✦</span>
          <span class="go-spark go-spark--tr">★</span>
          <span class="go-spark go-spark--bl">✧</span>
          <span class="go-spark go-spark--br">✦</span>
        </div>
        <h2 id="gameOverTitle" class="game-over-title">Game Over</h2>
        <p class="game-over-score-row">
          Final score
          <span id="finalScore" class="game-over-score">0</span>
        </p>
        <button type="button" id="overlayRestartBtn" class="restart-btn game-over-restart">
          Restart
        </button>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
