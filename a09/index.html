<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="falling-decor" class="falling-decor" aria-hidden="true"></div>
  <main class="game-wrapper">
    <h1><span class="title-bow" aria-hidden="true">🎀</span> Tetris</h1>

    <section class="hud" aria-label="Game stats">
      <div class="panel">
        <span class="label">Score</span>
        <span id="score" class="value">0</span>
      </div>
      <div class="panel">
        <span class="label">High Score</span>
        <span id="high-score" class="value">0</span>
      </div>
      <div class="panel">
        <span class="label">Lines</span>
        <span id="lines" class="value">0</span>
      </div>
      <div class="panel">
        <span class="label">Level</span>
        <span id="level" class="value">1</span>
      </div>
    </section>

    <div class="audio-row">
      <button id="mute-toggle" class="mute-btn" type="button" aria-pressed="false">
        Sound: On
      </button>
    </div>

    <canvas id="tetris" width="300" height="600" aria-label="Tetris board"></canvas>

    <div id="game-over-overlay" class="game-over-overlay hidden" role="dialog" aria-live="polite" aria-label="Game over">
      <div class="game-over-card">
        <h2>Game Over</h2>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-button" class="restart-btn" type="button">Restart</button>
      </div>
    </div>

    <p class="instructions">
      Controls: ← → move, ↓ drop faster, ↑ rotate, R restart
    </p>
  </main>

  <script src="tetris.js"></script>
</body>
</html>
