<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 12% 20%, rgba(251, 146, 60, 0.18), transparent 26%),
        radial-gradient(circle at 90% 82%, rgba(56, 189, 248, 0.2), transparent 28%),
        repeating-linear-gradient(
          90deg,
          #c88a52 0,
          #c88a52 55px,
          #d79a64 55px,
          #d79a64 110px
        );
      color: #f8fafc;
      font-family: "Trebuchet MS", Arial, Helvetica, sans-serif;
      padding: 20px;
      overflow: hidden;
    }

    .layout {
      position: relative;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .panel {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.94), rgba(30, 41, 59, 0.94));
      border: 2px solid rgba(248, 250, 252, 0.3);
      border-radius: 12px;
      padding: 14px;
      width: 210px;
      box-shadow: 0 10px 22px rgba(2, 6, 23, 0.45);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      color: #f97316;
      text-shadow: 0 0 10px rgba(249, 115, 22, 0.4);
    }

    p {
      margin: 8px 0;
      color: #cbd5e1;
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .stat {
      margin: 8px 0;
      font-size: 1rem;
    }

    .value {
      color: #facc15;
      font-weight: 700;
      margin-left: 6px;
    }

    #game {
      border: 4px solid #f8fafc;
      background: #020617;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
      border-radius: 8px;
    }

    .court-line {
      position: fixed;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 4px;
      height: 100vh;
      background: rgba(255, 255, 255, 0.22);
      pointer-events: none;
      z-index: 0;
    }

    .court-arc {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 340px;
      height: 340px;
      border: 4px solid rgba(37, 99, 235, 0.4);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: -2;
      pointer-events: none;
    }

    .thunder-stripe {
      position: fixed;
      top: 0;
      width: 18px;
      height: 100vh;
      background: linear-gradient(180deg, rgba(37, 99, 235, 0.5), rgba(249, 115, 22, 0.5));
      z-index: -2;
      pointer-events: none;
      opacity: 0.9;
    }

    .thunder-stripe.left {
      left: 6%;
    }

    .thunder-stripe.right {
      right: 6%;
    }

    .basketball {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fb923c, #ea580c 70%);
      border: 2px solid #7c2d12;
      box-shadow: 0 8px 16px rgba(2, 6, 23, 0.45);
      z-index: -1;
    }

    .basketball::before,
    .basketball::after {
      content: "";
      position: absolute;
      background: #111827;
      opacity: 0.75;
    }

    .basketball::before {
      left: 50%;
      top: 4px;
      transform: translateX(-50%);
      width: 2px;
      height: 60px;
    }

    .basketball::after {
      left: 5px;
      top: 50%;
      transform: translateY(-50%);
      width: 58px;
      height: 2px;
    }

    .basketball.left-top {
      left: -45px;
      top: -30px;
      transform: rotate(-15deg);
    }

    .basketball.right-mid {
      right: 160px;
      top: 190px;
      transform: rotate(20deg);
    }

    .basketball.left-bottom {
      left: 120px;
      bottom: -30px;
      transform: rotate(12deg);
    }

    .goal {
      position: fixed;
      width: 120px;
      height: 90px;
      z-index: -2;
      opacity: 0.92;
      pointer-events: none;
    }

    .goal .backboard {
      position: absolute;
      top: 0;
      width: 86px;
      height: 52px;
      background: linear-gradient(180deg, rgba(241, 245, 249, 0.85), rgba(226, 232, 240, 0.6));
      border: 3px solid rgba(15, 23, 42, 0.8);
      border-radius: 4px;
    }

    .goal .rim {
      position: absolute;
      top: 48px;
      width: 54px;
      height: 16px;
      border: 4px solid #ea580c;
      border-top: none;
      border-radius: 0 0 24px 24px;
    }

    .goal .net {
      position: absolute;
      top: 62px;
      left: 22px;
      width: 48px;
      height: 20px;
      background:
        repeating-linear-gradient(90deg, transparent 0, transparent 6px, rgba(248, 250, 252, 0.8) 6px, rgba(248, 250, 252, 0.8) 7px),
        repeating-linear-gradient(180deg, transparent 0, transparent 6px, rgba(248, 250, 252, 0.8) 6px, rgba(248, 250, 252, 0.8) 7px);
      clip-path: polygon(0 0, 100% 0, 86% 100%, 14% 100%);
      opacity: 0.9;
    }

    .goal .pole {
      position: absolute;
      top: 18px;
      width: 8px;
      height: 70px;
      background: #1e293b;
      border-radius: 3px;
    }

    .goal.left-goal {
      left: 28px;
      top: 72px;
      transform: rotate(-6deg);
    }

    .goal.left-goal .backboard { left: 0; }
    .goal.left-goal .rim { left: 20px; }
    .goal.left-goal .net { left: 22px; }
    .goal.left-goal .pole { left: 88px; }

    .goal.right-goal {
      right: 24px;
      bottom: 74px;
      transform: rotate(7deg) scaleX(-1);
    }

    .goal.right-goal .backboard { left: 0; }
    .goal.right-goal .rim { left: 20px; }
    .goal.right-goal .net { left: 22px; }
    .goal.right-goal .pole { left: 88px; }

    .jersey {
      position: fixed;
      width: 92px;
      height: 104px;
      border: 3px solid rgba(248, 250, 252, 0.7);
      border-radius: 12px 12px 10px 10px;
      clip-path: polygon(14% 0, 35% 0, 44% 12%, 56% 12%, 65% 0, 86% 0, 100% 23%, 86% 42%, 86% 100%, 14% 100%, 14% 42%, 0 23%);
      box-shadow: 0 10px 20px rgba(2, 6, 23, 0.45);
      z-index: -2;
      pointer-events: none;
      overflow: hidden;
    }

    .jersey::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.12), transparent 40%);
    }

    .jersey::after {
      content: attr(data-number);
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      font-weight: 900;
      font-size: 36px;
      color: rgba(248, 250, 252, 0.92);
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      letter-spacing: 1px;
      text-shadow: 0 2px 0 rgba(15, 23, 42, 0.5);
    }

    .jersey.left-jersey {
      left: 36px;
      bottom: 132px;
      transform: rotate(-12deg);
      background:
        linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%);
    }

    .jersey.right-jersey {
      right: 48px;
      top: 120px;
      transform: rotate(11deg);
      background:
        linear-gradient(180deg, #f97316 0%, #ea580c 100%);
    }

    .jersey .name {
      position: absolute;
      top: 13px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: rgba(241, 245, 249, 0.95);
      text-transform: uppercase;
    }

    .shoe {
      position: fixed;
      width: 80px;
      height: 34px;
      border-radius: 22px 10px 12px 14px;
      background: linear-gradient(90deg, #e2e8f0, #94a3b8);
      border: 2px solid #0f172a;
      box-shadow: 0 6px 14px rgba(2, 6, 23, 0.35);
      z-index: -2;
      pointer-events: none;
    }

    .shoe::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 14px;
      width: 54px;
      height: 2px;
      background: rgba(15, 23, 42, 0.45);
      box-shadow: 0 6px 0 rgba(15, 23, 42, 0.45);
    }

    .shoe.left-shoe {
      left: 160px;
      bottom: 22px;
      transform: rotate(-10deg);
    }

    .shoe.right-shoe {
      right: 130px;
      bottom: 30px;
      transform: rotate(12deg) scaleX(-1);
      background: linear-gradient(90deg, #fbbf24, #f97316);
    }

    .hint {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .leaderboard {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(148, 163, 184, 0.35);
    }

    .leaderboard h2 {
      margin: 0 0 8px;
      font-size: 1rem;
      letter-spacing: 0.4px;
      color: #93c5fd;
    }

    .leaderboard-form {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .leaderboard-form input {
      flex: 1;
      min-width: 0;
      padding: 7px 8px;
      border-radius: 6px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.8);
      color: #f8fafc;
      font-size: 0.85rem;
    }

    .leaderboard-form button {
      border: 1px solid rgba(251, 146, 60, 0.7);
      border-radius: 6px;
      background: #ea580c;
      color: #fff;
      padding: 7px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
    }

    .leaderboard-form button:hover {
      background: #f97316;
    }

    #leaderboard-list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 150px;
      overflow: auto;
      font-size: 0.85rem;
    }

    #leaderboard-list li {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      padding: 4px 2px;
      color: #e2e8f0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
    }

    #leaderboard-list li:last-child {
      border-bottom: none;
    }

    .leaderboard-empty {
      color: #94a3b8;
      font-style: italic;
    }

    #leaderboard-message {
      margin: 6px 0 0;
      min-height: 16px;
      font-size: 0.75rem;
      color: #fde68a;
    }

    #trophy-drop {
      position: fixed;
      top: -90px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 68px;
      line-height: 1;
      z-index: 6;
      opacity: 0;
      pointer-events: none;
      filter: drop-shadow(0 10px 10px rgba(15, 23, 42, 0.45));
    }

    #trophy-drop.active {
      animation: trophy-fall 2200ms ease-in forwards;
    }

    @keyframes trophy-fall {
      0% {
        top: -90px;
        opacity: 0;
        transform: translateX(-50%) rotate(-14deg) scale(0.9);
      }
      12% {
        opacity: 1;
      }
      75% {
        opacity: 1;
      }
      100% {
        top: calc(100vh - 120px);
        opacity: 0;
        transform: translateX(-50%) rotate(10deg) scale(1.15);
      }
    }

    #lightning-hit {
      position: fixed;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 120px;
      line-height: 1;
      opacity: 0;
      z-index: 8;
      pointer-events: none;
      filter: drop-shadow(0 0 14px rgba(125, 211, 252, 0.95));
    }

    #lightning-hit.active {
      animation: lightning-hit 700ms ease-out forwards;
    }

    @keyframes lightning-hit {
      0% {
        top: -150px;
        opacity: 0;
        transform: translateX(-50%) scale(0.9);
      }
      35% {
        opacity: 1;
      }
      100% {
        top: calc(100vh - 180px);
        opacity: 0;
        transform: translateX(-50%) scale(1.08);
      }
    }
  </style>
</head>
<body>
  <div id="trophy-drop" aria-hidden="true">🏆</div>
  <div id="lightning-hit" aria-hidden="true">⚡</div>
  <div class="court-line" aria-hidden="true"></div>
  <div class="court-arc" aria-hidden="true"></div>
  <div class="thunder-stripe left" aria-hidden="true"></div>
  <div class="thunder-stripe right" aria-hidden="true"></div>
  <div class="goal left-goal" aria-hidden="true">
    <div class="backboard"></div>
    <div class="rim"></div>
    <div class="net"></div>
    <div class="pole"></div>
  </div>
  <div class="goal right-goal" aria-hidden="true">
    <div class="backboard"></div>
    <div class="rim"></div>
    <div class="net"></div>
    <div class="pole"></div>
  </div>
  <div class="jersey left-jersey" data-number="0" aria-hidden="true">
    <div class="name">THUNDER</div>
  </div>
  <div class="jersey right-jersey" data-number="35" aria-hidden="true">
    <div class="name">OKC</div>
  </div>
  <div class="shoe left-shoe" aria-hidden="true"></div>
  <div class="shoe right-shoe" aria-hidden="true"></div>
  <div class="layout">
    <div class="basketball left-top" aria-hidden="true"></div>
    <div class="basketball right-mid" aria-hidden="true"></div>
    <div class="basketball left-bottom" aria-hidden="true"></div>
    <canvas id="game" width="300" height="600"></canvas>
    <aside class="panel">
      <h1>NBA Tetris</h1>
      <div class="stat">Score:<span id="score" class="value">0</span></div>
      <div class="stat">Lines:<span id="lines" class="value">0</span></div>
      <div class="stat">Level:<span id="level" class="value">1</span></div>
      <p>Controls:</p>
      <p>Left / Right arrow: Move</p>
      <p>Down arrow: Soft drop</p>
      <p>Space: Rotate block</p>
      <p class="hint">Refresh page to restart after game over.</p>
      <section class="leaderboard">
        <h2>Leaderboard</h2>
        <form id="leaderboard-form" class="leaderboard-form">
          <input id="player-name" type="text" maxlength="14" placeholder="Player name" autocomplete="off" />
          <button type="submit">Save</button>
        </form>
        <ol id="leaderboard-list"></ol>
        <p id="leaderboard-message"></p>
      </section>
    </aside>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const linesEl = document.getElementById("lines");
    const levelEl = document.getElementById("level");
    const leaderboardFormEl = document.getElementById("leaderboard-form");
    const playerNameEl = document.getElementById("player-name");
    const leaderboardListEl = document.getElementById("leaderboard-list");
    const leaderboardMessageEl = document.getElementById("leaderboard-message");
    const trophyDropEl = document.getElementById("trophy-drop");
    const lightningHitEl = document.getElementById("lightning-hit");

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;
    const LEADERBOARD_KEY = "okc_tetris_leaderboard_v1";
    const LEADERBOARD_LIMIT = 10;

    const SHAPES = [
      { color: "#22d3ee", matrix: [[1, 1, 1, 1]] },
      { color: "#3b82f6", matrix: [[1, 0, 0], [1, 1, 1], [0, 0, 0]] },
      { color: "#f97316", matrix: [[0, 0, 1], [1, 1, 1], [0, 0, 0]] },
      { color: "#facc15", matrix: [[1, 1], [1, 1]] },
      { color: "#22c55e", matrix: [[0, 1, 1], [1, 1, 0], [0, 0, 0]] },
      { color: "#a855f7", matrix: [[0, 1, 0], [1, 1, 1], [0, 0, 0]] },
      { color: "#ef4444", matrix: [[1, 1, 0], [0, 1, 1], [0, 0, 0]] }
    ];

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function cloneMatrix(matrix) {
      return matrix.map((row) => row.slice());
    }

    function randomPiece() {
      const template = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      return {
        x: Math.floor(COLS / 2) - Math.ceil(template.matrix[0].length / 2),
        y: 0,
        color: template.color,
        matrix: cloneMatrix(template.matrix)
      };
    }

    function rotateClockwise(matrix) {
      const size = matrix.length;
      const rotated = Array.from({ length: size }, () => Array(size).fill(0));
      for (let y = 0; y < size; y += 1) {
        for (let x = 0; x < size; x += 1) {
          rotated[x][size - 1 - y] = matrix[y][x];
        }
      }
      return rotated;
    }

    let board = createBoard();
    let piece = randomPiece();
    let score = 0;
    let lines = 0;
    let level = 1;
    let dropCounter = 0;
    let dropInterval = 700;
    let lastTime = 0;
    let isGameOver = false;
    let audioCtx = null;
    let sfxGain = null;
    let musicGain = null;
    let musicTimer = null;
    let wakaFlip = false;
    let nextTrophyMilestone = 300;
    let nextLightningMilestone = 500;
    let leaderboard = [];

    function loadLeaderboard() {
      try {
        const raw = localStorage.getItem(LEADERBOARD_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed
          .filter((entry) => entry && typeof entry.name === "string" && Number.isFinite(entry.score))
          .slice(0, LEADERBOARD_LIMIT);
      } catch (error) {
        console.error("Failed to load leaderboard:", error);
        return [];
      }
    }

    function saveLeaderboard() {
      localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(leaderboard));
    }

    function renderLeaderboard() {
      leaderboardListEl.innerHTML = "";
      if (leaderboard.length === 0) {
        const emptyItem = document.createElement("li");
        emptyItem.className = "leaderboard-empty";
        emptyItem.textContent = "No highscores yet.";
        leaderboardListEl.appendChild(emptyItem);
        return;
      }

      leaderboard.forEach((entry, index) => {
        const item = document.createElement("li");
        const nameSpan = document.createElement("span");
        const scoreSpan = document.createElement("span");
        nameSpan.textContent = `${index + 1}. ${entry.name}`;
        scoreSpan.textContent = String(entry.score);
        item.appendChild(nameSpan);
        item.appendChild(scoreSpan);
        leaderboardListEl.appendChild(item);
      });
    }

    function addLeaderboardScore(name, playerScore) {
      leaderboard.push({
        name: name.trim().slice(0, 14),
        score: playerScore
      });
      leaderboard.sort((a, b) => b.score - a.score);
      leaderboard = leaderboard.slice(0, LEADERBOARD_LIMIT);
      saveLeaderboard();
      renderLeaderboard();
    }

    function ensureAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        sfxGain = audioCtx.createGain();
        musicGain = audioCtx.createGain();
        sfxGain.gain.value = 0.95;
        musicGain.gain.value = 0.55;
        sfxGain.connect(audioCtx.destination);
        musicGain.connect(audioCtx.destination);
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      if (!musicTimer && !isGameOver) {
        startBackgroundMusic();
      }
      return audioCtx;
    }

    function playTone(type, frequency, duration, volume, slideTo = null, channel = "sfx") {
      const ctxAudio = ensureAudioContext();
      const oscillator = ctxAudio.createOscillator();
      const gainNode = ctxAudio.createGain();
      const now = ctxAudio.currentTime;

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, now);
      if (slideTo !== null) {
        oscillator.frequency.linearRampToValueAtTime(slideTo, now + duration);
      }

      gainNode.gain.setValueAtTime(volume, now);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      oscillator.connect(gainNode);
      gainNode.connect(channel === "music" ? musicGain : sfxGain);
      oscillator.start(now);
      oscillator.stop(now + duration);
    }

    function startBackgroundMusic() {
      const lead = [392, 440, 523, 587, 523, 440, 392, 330];
      const bass = [196, 220, 196, 174];
      let step = 0;

      musicTimer = setInterval(() => {
        if (isGameOver) return;
        const leadNote = lead[step % lead.length];
        const bassNote = bass[step % bass.length];
        playTone("triangle", leadNote, 0.24, 0.032, null, "music");
        if (step % 2 === 0) {
          playTone("sine", bassNote, 0.3, 0.022, null, "music");
        }
        step += 1;
      }, 260);
    }

    function stopBackgroundMusic() {
      if (musicTimer) {
        clearInterval(musicTimer);
        musicTimer = null;
      }
    }

    const sfx = {
      move() {
        const start = wakaFlip ? 720 : 560;
        const end = wakaFlip ? 520 : 700;
        wakaFlip = !wakaFlip;
        playTone("square", start, 0.045, 0.045, end);
      },
      rotate() {
        playTone("square", 760, 0.05, 0.05, 940);
      },
      lock() {
        playTone("triangle", 240, 0.06, 0.05, 180);
      },
      lineClear() {
        playTone("square", 620, 0.07, 0.06, 760);
        setTimeout(() => playTone("square", 760, 0.07, 0.06, 920), 65);
        setTimeout(() => playTone("square", 920, 0.08, 0.05, 1080), 130);
      },
      gameOver() {
        playTone("sawtooth", 420, 0.12, 0.06, 300);
        setTimeout(() => playTone("sawtooth", 300, 0.12, 0.055, 210), 100);
        setTimeout(() => playTone("sawtooth", 210, 0.14, 0.05, 120), 210);
      },
      lightning() {
        playTone("sawtooth", 980, 0.08, 0.08, 260);
        setTimeout(() => playTone("sawtooth", 360, 0.18, 0.07, 80), 60);
      }
    };

    function updateStats() {
      scoreEl.textContent = String(score);
      linesEl.textContent = String(lines);
      levelEl.textContent = String(level);
    }

    function triggerSingleTrophy() {
      trophyDropEl.style.left = `${15 + Math.random() * 70}%`;
      trophyDropEl.classList.remove("active");
      void trophyDropEl.offsetWidth;
      trophyDropEl.classList.add("active");
    }

    function triggerTrophyBurst(count = 4) {
      for (let i = 0; i < count; i += 1) {
        setTimeout(triggerSingleTrophy, i * 220);
      }
    }

    function triggerLightningStrike() {
      lightningHitEl.classList.remove("active");
      void lightningHitEl.offsetWidth;
      lightningHitEl.classList.add("active");
      sfx.lightning();
    }

    function clearBlueAndOrangeBlocks() {
      const removableColors = new Set(["#3b82f6", "#f97316"]);
      for (let y = 0; y < ROWS; y += 1) {
        for (let x = 0; x < COLS; x += 1) {
          if (removableColors.has(board[y][x])) {
            board[y][x] = 0;
          }
        }
      }

      if (removableColors.has(piece.color)) {
        let replacement = randomPiece();
        while (removableColors.has(replacement.color)) {
          replacement = randomPiece();
        }
        piece = replacement;
        if (collides(board, piece)) {
          isGameOver = true;
          sfx.gameOver();
        }
      }
    }

    function processScoreEvents() {
      while (score >= nextTrophyMilestone) {
        triggerTrophyBurst();
        nextTrophyMilestone += 300;
      }

      while (score >= nextLightningMilestone) {
        triggerLightningStrike();
        clearBlueAndOrangeBlocks();
        nextLightningMilestone += 500;
      }
    }

    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
      ctx.strokeStyle = "#0f172a";
      ctx.lineWidth = 2;
      ctx.strokeRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
    }

    function drawBoard() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let y = 0; y < ROWS; y += 1) {
        for (let x = 0; x < COLS; x += 1) {
          if (board[y][x]) {
            drawCell(x, y, board[y][x]);
          }
        }
      }
    }

    function drawPiece(activePiece) {
      const { matrix, x: offsetX, y: offsetY, color } = activePiece;
      for (let y = 0; y < matrix.length; y += 1) {
        for (let x = 0; x < matrix[y].length; x += 1) {
          if (matrix[y][x]) {
            drawCell(offsetX + x, offsetY + y, color);
          }
        }
      }
    }

    function collides(targetBoard, activePiece) {
      const { matrix, x: offsetX, y: offsetY } = activePiece;
      for (let y = 0; y < matrix.length; y += 1) {
        for (let x = 0; x < matrix[y].length; x += 1) {
          if (!matrix[y][x]) {
            continue;
          }
          const boardX = offsetX + x;
          const boardY = offsetY + y;
          if (
            boardX < 0 ||
            boardX >= COLS ||
            boardY >= ROWS ||
            (boardY >= 0 && targetBoard[boardY][boardX])
          ) {
            return true;
          }
        }
      }
      return false;
    }

    function mergePiece() {
      for (let y = 0; y < piece.matrix.length; y += 1) {
        for (let x = 0; x < piece.matrix[y].length; x += 1) {
          if (piece.matrix[y][x]) {
            board[piece.y + y][piece.x + x] = piece.color;
          }
        }
      }
    }

    function clearLines() {
      let cleared = 0;
      for (let y = ROWS - 1; y >= 0; y -= 1) {
        if (board[y].every((cell) => cell !== 0)) {
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(0));
          cleared += 1;
          y += 1;
        }
      }

      if (cleared > 0) {
        lines += cleared;
        score += [0, 100, 300, 500, 800][cleared] * level;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(120, 700 - (level - 1) * 60);
        processScoreEvents();
        updateStats();
        sfx.lineClear();
      }
    }

    function spawnNewPiece() {
      piece = randomPiece();
      if (collides(board, piece)) {
        isGameOver = true;
        stopBackgroundMusic();
        sfx.gameOver();
      }
    }

    function moveHorizontal(direction) {
      if (isGameOver) return;
      piece.x += direction;
      if (collides(board, piece)) {
        piece.x -= direction;
      } else {
        sfx.move();
      }
    }

    function rotatePiece() {
      if (isGameOver) return;
      const original = piece.matrix;
      piece.matrix = rotateClockwise(piece.matrix);
      if (collides(board, piece)) {
        piece.x += 1;
        if (collides(board, piece)) {
          piece.x -= 2;
          if (collides(board, piece)) {
            piece.x += 1;
            piece.matrix = original;
          }
        }
      } else {
        sfx.rotate();
      }
    }

    function dropPiece() {
      if (isGameOver) return;
      piece.y += 1;
      if (collides(board, piece)) {
        piece.y -= 1;
        mergePiece();
        sfx.lock();
        clearLines();
        spawnNewPiece();
      }
      dropCounter = 0;
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(2, 6, 23, 0.75)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#f8fafc";
      ctx.textAlign = "center";
      ctx.font = "bold 34px Arial";
      ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 8);
      ctx.font = "18px Arial";
      ctx.fillText("Refresh page to play again", canvas.width / 2, canvas.height / 2 + 26);
    }

    function update(time = 0) {
      const delta = time - lastTime;
      lastTime = time;
      dropCounter += delta;

      if (dropCounter >= dropInterval && !isGameOver) {
        dropPiece();
      }

      drawBoard();
      if (!isGameOver) {
        drawPiece(piece);
      } else {
        drawGameOver();
      }

      requestAnimationFrame(update);
    }

    document.addEventListener("keydown", (event) => {
      ensureAudioContext();
      if (event.code === "ArrowLeft") {
        event.preventDefault();
        moveHorizontal(-1);
      } else if (event.code === "ArrowRight") {
        event.preventDefault();
        moveHorizontal(1);
      } else if (event.code === "ArrowDown") {
        event.preventDefault();
        dropPiece();
      } else if (event.code === "Space") {
        event.preventDefault();
        rotatePiece();
      }
    });

    leaderboardFormEl.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = playerNameEl.value.trim();
      if (!name) {
        leaderboardMessageEl.textContent = "Enter your name first.";
        return;
      }

      addLeaderboardScore(name, score);
      leaderboardMessageEl.textContent = `Saved ${name}: ${score}`;
      playerNameEl.value = "";
    });

    leaderboard = loadLeaderboard();
    renderLeaderboard();
    updateStats();
    update();
  </script>
</body>
</html>
